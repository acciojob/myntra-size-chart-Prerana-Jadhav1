<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size Chart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Size Chart</h1>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Part</th>
                        <th>XS</th>
                        <th>S</th>
                        <th>M</th>
                        <th>L</th>
                        <th>XL</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Waist</td>
                        <td>25</td>
                        <td>28</td>
                        <td>30</td>
                        <td>31</td>
                        <td>32</td>
                    </tr>
                    <tr>
                        <td>Chest</td>
                        <td>34</td>
                        <td>34</td>
                        <td>38</td>
                        <td>40</td>
                        <td>41</td>
                    </tr>
                    <tr>
                        <td>Sleeve</td>
                        <td>23</td>
                        <td>24</td>
                        <td>24</td>
                        <td>25</td>
                        <td>25</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="note">
            <p><strong>Note:</strong> All measurements are in inches. For the best fit, please measure yourself and compare with the size chart above.</p>
        </div>
    </div>
</body>
</html>
